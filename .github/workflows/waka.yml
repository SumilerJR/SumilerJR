name: Waka Readme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: 更新 WakaTime 统计到 README
        uses: anmol098/waka-readme-stats@master
        with:
          # 注意：这里必须使用个人访问令牌（PAT），并保存为仓库机密 GH_TOKEN。
          # 建议使用 classic token，最少包含 repo 和 user 权限。
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          LOCALE: "zh"
          COMMIT_MESSAGE: "coding"
          SHOW_TIMEZONE: "True"
          SHOW_OS: "True"
          SHOW_PROJECTS: "False"
          SHOW_LANGUAGE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_TOTAL_CODE_TIME: "True"
